services:
  - type: web
    name: catatan-keuangan
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ALLOWED_TELEGRAM_IDS
        sync: false
      - key: API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
